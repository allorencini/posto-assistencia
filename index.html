<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f3460">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Controle de Presenca</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Sync indicator -->
  <div id="sync-indicator" class="sync-indicator online" title="Sincronizado">
    <span class="sync-dot"></span>
  </div>

  <!-- Page: Cadastros -->
  <main id="page-cadastro" class="page active">
    <header class="page-header">
      <h1>Cadastros</h1>
    </header>
    <div class="page-content" id="cadastro-content"></div>
  </main>

  <!-- Page: Chamada -->
  <main id="page-chamada" class="page">
    <header class="page-header">
      <h1>Chamada do Dia</h1>
      <input type="text" id="search-chamada" class="search-input"
        placeholder="Buscar por nome..." style="margin-top:8px;">
    </header>
    <div class="page-content" id="chamada-content"></div>
  </main>

  <!-- Page: Historico -->
  <main id="page-historico" class="page">
    <header class="page-header">
      <h1>Historico</h1>
      <input type="text" id="historico-search" class="search-input"
        placeholder="Buscar por nome..." style="margin-top:8px;">
    </header>
    <div class="page-content" id="historico-content"></div>
  </main>

  <!-- Page: Ranking -->
  <main id="page-ranking" class="page">
    <header class="page-header">
      <h1>Ranking de Presenca</h1>
    </header>
    <div class="page-content" id="ranking-content"></div>
  </main>

  <!-- Page: Estoque -->
  <main id="page-estoque" class="page">
    <header class="page-header">
      <h1>Estoque</h1>
    </header>
    <div class="page-content" id="estoque-content"></div>
  </main>

  <!-- Page: Pedidos -->
  <main id="page-pedidos" class="page">
    <header class="page-header">
      <h1>Pedidos de Doação</h1>
    </header>
    <div class="page-content" id="pedidos-content"></div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="cadastro">
      <span class="nav-icon">👥</span>
      <span class="nav-label">Cadastros</span>
    </button>
    <button class="nav-btn" data-page="chamada">
      <span class="nav-icon">✅</span>
      <span class="nav-label">Chamada</span>
    </button>
    <button class="nav-btn" data-page="historico">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Historico</span>
    </button>
    <button class="nav-btn" data-page="ranking">
      <span class="nav-icon">🏆</span>
      <span class="nav-label">Ranking</span>
    </button>
    <button class="nav-btn" data-page="estoque">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Estoque</span>
    </button>
    <button class="nav-btn" data-page="pedidos">
      <span class="nav-icon">🎁</span>
      <span class="nav-label">Pedidos</span>
    </button>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
