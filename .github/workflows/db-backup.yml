name: db-backup

# Backup semanal do Postgres do Supabase. Roda domingo 03:00 UTC (00:00 BRT)
# e pode ser disparado manualmente. Mantém artifact por 90 dias (free tier).
# Pra restaurar: baixa o artifact e roda `gunzip -c dump.sql.gz | psql ...`.
#
# Requisitos (Settings → Secrets and variables → Actions):
#   SUPABASE_DB_HOST     — ex: aws-1-sa-east-1.pooler.supabase.com  (use Session pooler — IPv4)
#   SUPABASE_DB_PORT     — 5432
#   SUPABASE_DB_USER     — ex: postgres.hhtxaeauuutmuwwkotgf
#   SUPABASE_DB_PASSWORD — senha do banco
#   SUPABASE_DB_NAME     — postgres
# Pegar em Supabase → Connect → Session pooler → vista "PSQL" mostra cada campo.

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch: {}

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install postgresql-client-17
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump database
        env:
          PGHOST: ${{ secrets.SUPABASE_DB_HOST }}
          PGPORT: ${{ secrets.SUPABASE_DB_PORT }}
          PGUSER: ${{ secrets.SUPABASE_DB_USER }}
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGDATABASE: ${{ secrets.SUPABASE_DB_NAME }}
        run: |
          for var in PGHOST PGPORT PGUSER PGPASSWORD PGDATABASE; do
            if [ -z "${!var}" ]; then
              echo "::error::Secret $var not configured"
              exit 1
            fi
          done
          mkdir -p backup
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          pg_dump \
            --no-owner \
            --no-privileges \
            --schema=public \
            --schema=auth \
            --format=plain \
            | gzip > "backup/presenca-${STAMP}.sql.gz"
          ls -lh backup/

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: presenca-db-backup
          path: backup/*.sql.gz
          retention-days: 90
          if-no-files-found: error
